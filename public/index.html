<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParaEnvios — Cotizador</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #chat-container {
      width: 100%;
      max-width: 720px;
      height: 100dvh;
      max-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #fff;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
    }

    header {
      background: #1a56db;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header .avatar {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    header h1 { font-size: 17px; font-weight: 600; }
    header p  { font-size: 12px; opacity: 0.8; margin-top: 2px; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg.bot {
      background: #f0f2f5;
      color: #111;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }

    .msg.user {
      background: #1a56db;
      color: #fff;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }

    /* Markdown dentro de mensajes del bot */
    .msg.bot p  { margin-bottom: 8px; }
    .msg.bot p:last-child { margin-bottom: 0; }
    .msg.bot strong { font-weight: 600; }
    .msg.bot em { font-style: italic; }
    .msg.bot ul, .msg.bot ol { padding-left: 18px; margin: 6px 0; }
    .msg.bot li { margin-bottom: 4px; }
    .msg.bot code {
      background: rgba(0,0,0,0.07);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
    }
    .msg.bot pre {
      background: rgba(0,0,0,0.07);
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .msg.bot pre code { background: none; padding: 0; }

    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      background: #f0f2f5;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      width: fit-content;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    #input-area {
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      background: #fff;
    }

    #input {
      flex: 1;
      resize: none;
      border: 1px solid #d1d5db;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s;
    }

    #input:focus { border-color: #1a56db; }

    #send {
      width: 42px;
      height: 42px;
      background: #1a56db;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #send:hover { background: #1648c0; }
    #send:disabled { background: #9ca3af; cursor: not-allowed; }

    #send svg { width: 18px; height: 18px; fill: #fff; }
  </style>
</head>
<body>

<div id="chat-container">
  <header>
    <div class="avatar">📦</div>
    <div>
      <h1>ParaEnvios — Cotizador</h1>
      <p>Brasil → Venezuela</p>
    </div>
  </header>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="input" placeholder="Escribe tu mensaje..." rows="1"></textarea>
    <button id="send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send');

  // Session ID persistente en localStorage
  let sessionId = localStorage.getItem('paraenvios_session');
  if (!sessionId) {
    sessionId = crypto.randomUUID();
    localStorage.setItem('paraenvios_session', sessionId);
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (role === 'bot') {
      div.innerHTML = marked.parse(text);
    } else {
      div.textContent = text;
    }
    messagesEl.appendChild(div);
    scrollBottom();
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function hideTyping() {
    document.getElementById('typing')?.remove();
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    addMessage(text, 'user');
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message: text })
      });
      const data = await res.json();
      hideTyping();
      addMessage(data.reply || data.error || 'Error sin mensaje', 'bot');
    } catch (e) {
      hideTyping();
      addMessage('Error de conexión. Intenta de nuevo.', 'bot');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener('click', send);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Mensaje de bienvenida al cargar
  window.addEventListener('load', () => {
    addMessage('¡Hola! Soy el asistente de cotizaciones de ParaEnvios 📦\n\n¿Qué necesitas enviar de Brasil a Venezuela? Cuéntame y te calculo el flete.', 'bot');
    inputEl.focus();
  });
</script>

</body>
</html>
