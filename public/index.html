<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParaEnvios — Cotizador</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:       #2563eb;
      --brand-dark:  #1d4ed8;
      --brand-light: #eff6ff;
      --bg:          #f8fafc;
      --surface:     #ffffff;
      --border:      #e2e8f0;
      --text:        #0f172a;
      --muted:       #94a3b8;
      --bubble-bot:  #f1f5f9;
      --bubble-user: #2563eb;
      --radius:      16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    /* ── Layout ── */
    #app {
      width: 100%;
      max-width: 780px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    @media (min-height: 700px) {
      #app { max-height: 860px; border-radius: 20px; }
      body { padding: 20px; }
    }

    /* ── Header ── */
    header {
      padding: 18px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .header-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    .header-text p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Group spacing: bigger gap between turns */
    .msg-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .msg-wrap + .msg-wrap { margin-top: 10px; }

    .msg-wrap.user { align-items: flex-end; }
    .msg-wrap.bot  { align-items: flex-start; }

    .msg {
      max-width: 78%;
      padding: 11px 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      position: relative;
    }

    .msg.bot {
      background: var(--bubble-bot);
      color: var(--text);
      border-radius: var(--radius) var(--radius) var(--radius) 4px;
    }

    .msg.user {
      background: var(--bubble-user);
      color: #fff;
      border-radius: var(--radius) var(--radius) 4px var(--radius);
    }

    /* Markdown inside bot bubbles */
    .msg.bot p                 { margin-bottom: 8px; }
    .msg.bot p:last-child      { margin-bottom: 0; }
    .msg.bot strong            { font-weight: 600; }
    .msg.bot ul, .msg.bot ol   { padding-left: 20px; margin: 6px 0; }
    .msg.bot li                { margin-bottom: 3px; }
    .msg.bot code {
      background: rgba(0,0,0,0.07);
      padding: 1px 6px;
      border-radius: 5px;
      font-size: 13px;
      font-family: monospace;
    }
    .msg.bot pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 12px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 13px;
    }
    .msg.bot pre code { background: none; color: inherit; padding: 0; }

    .msg-time {
      font-size: 10px;
      color: var(--muted);
      padding: 0 4px;
    }

    /* ── Typing indicator ── */
    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 13px 18px;
      background: var(--bubble-bot);
      border-radius: var(--radius) var(--radius) var(--radius) 4px;
      width: fit-content;
      margin-top: 10px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); background: var(--muted); }
      30%           { transform: translateY(-6px); background: var(--brand); }
    }

    /* ── Suggestions ── */
    #suggestions {
      display: flex;
      gap: 8px;
      padding: 0 20px 12px;
      overflow-x: auto;
      flex-shrink: 0;
    }

    #suggestions::-webkit-scrollbar { display: none; }

    .suggestion {
      white-space: nowrap;
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      font-family: inherit;
      color: var(--brand);
      background: var(--brand-light);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .suggestion:hover {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }

    /* ── Language picker ── */
    #lang-picker {
      display: flex;
      gap: 10px;
      padding: 4px 20px 16px;
      flex-shrink: 0;
    }

    .lang-btn {
      flex: 1;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      background: var(--surface);
      color: var(--text);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .lang-btn .fi {
      width: 1.4em;
      height: 1.4em;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .lang-btn:hover {
      border-color: var(--brand);
      background: var(--brand-light);
      color: var(--brand);
    }


    /* ── Input area ── */
    #input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      background: var(--surface);
    }

    #input {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 11px 16px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      max-height: 120px;
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #input::placeholder { color: var(--muted); }

    #input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
      background: var(--surface);
    }

    #send {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    }

    #send:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(37,99,235,0.4);
    }

    #send:active:not(:disabled) { transform: scale(0.95); }

    #send:disabled {
      background: var(--border);
      box-shadow: none;
      cursor: not-allowed;
    }

    #send svg { width: 18px; height: 18px; fill: #fff; }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="header-icon">📦</div>
    <div class="header-text">
      <h1>ParaEnvios — Cotizador</h1>
      <p><span class="status-dot"></span> En línea · Brasil → Venezuela</p>
    </div>
  </header>

  <div id="messages"></div>

  <div id="lang-picker">
    <button class="lang-btn" onclick="chooseLang('es')"><span class="fi fi-ve fis"></span>Español</button>
    <button class="lang-btn" onclick="chooseLang('pt')"><span class="fi fi-br fis"></span>Português</button>
  </div>

  <div id="suggestions" style="display:none">
    <button class="suggestion" id="s1" onclick="useSuggestion(this)"></button>
    <button class="suggestion" id="s2" onclick="useSuggestion(this)"></button>
    <button class="suggestion" id="s3" onclick="useSuggestion(this)"></button>
    <button class="suggestion" id="s4" onclick="useSuggestion(this)"></button>
  </div>

  <div id="input-area">
    <textarea id="input" rows="1"></textarea>
    <button id="send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
  marked.setOptions({ breaks: true });

  const messagesEl    = document.getElementById('messages');
  const inputEl       = document.getElementById('input');
  const sendBtn       = document.getElementById('send');
  const suggestionsEl = document.getElementById('suggestions');
  const langPickerEl  = document.getElementById('lang-picker');

  let sessionId = localStorage.getItem('paraenvios_sid');
  if (!sessionId) {
    sessionId = crypto.randomUUID();
    localStorage.setItem('paraenvios_sid', sessionId);
  }

  let lang = 'es';

  const SUGGESTIONS = {
    es: ['📦 Cotizar envío express', '✈️ ¿Cuál modalidad me conviene?', '⚡ Envío rápido SEDEX', '💰 El más económico'],
    pt: ['📦 Cotar envio express',   '✈️ Qual modalidade me convém?',   '⚡ Envio rápido SEDEX',   '💰 O mais econômico']
  };

  function now() {
    return new Date().toLocaleTimeString(lang === 'pt' ? 'pt-BR' : 'es', { hour: '2-digit', minute: '2-digit' });
  }

  function scrollBottom() {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
  }

  function addMessage(text, role) {
    const wrap   = document.createElement('div');
    wrap.className = `msg-wrap ${role}`;
    const bubble = document.createElement('div');
    bubble.className = `msg ${role}`;
    if (role === 'bot') bubble.innerHTML = marked.parse(text);
    else bubble.textContent = text;
    const time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = now();
    wrap.appendChild(bubble);
    wrap.appendChild(time);
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function hideTyping() { document.getElementById('typing')?.remove(); }

  function chooseLang(chosen) {
    lang = chosen;
    langPickerEl.style.display = 'none';

    // Rellena y muestra las sugerencias del idioma elegido
    SUGGESTIONS[lang].forEach((text, i) => {
      document.getElementById(`s${i + 1}`).textContent = text;
    });
    suggestionsEl.style.display = 'flex';

    // Actualiza placeholder del input
    inputEl.placeholder = lang === 'pt' ? 'Escreva sua mensagem...' : 'Escribe tu mensaje...';

    // Envía la elección al bot de forma invisible
    const msg = lang === 'pt'
      ? 'Quero continuar em português.'
      : 'Quiero continuar en español.';
    sendSilent(msg);
  }

  function useSuggestion(btn) {
    inputEl.value = btn.textContent.replace(/^[^\s]+ /, '');
    suggestionsEl.style.display = 'none';
    send();
  }

  async function sendSilent(text) {
    sendBtn.disabled = true;
    showTyping();
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message: text })
      });
      const data = await res.json();
      hideTyping();
      addMessage(data.reply || data.error || '...', 'bot');
    } catch {
      hideTyping();
      addMessage(lang === 'pt' ? 'Erro de conexão.' : 'Error de conexión.', 'bot');
    }
    sendBtn.disabled = false;
    inputEl.focus();
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;
    suggestionsEl.style.display = 'none';
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    addMessage(text, 'user');
    showTyping();
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message: text })
      });
      const data = await res.json();
      hideTyping();
      addMessage(data.reply || data.error || '...', 'bot');
    } catch {
      hideTyping();
      addMessage(lang === 'pt' ? 'Erro de conexão.' : 'Error de conexión.', 'bot');
    }
    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener('click', send);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  window.addEventListener('load', () => {
    addMessage(
      '¡Hola! / Olá! Soy el cotizador de **ParaEnvios** 📦\n\n' +
      '¡Hola! Cuéntame qué necesitas enviar de Brasil a Venezuela y te calculo el flete al instante.\n\n' +
      'Olá! Conte-me o que você precisa enviar do Brasil para a Venezuela e calculamos o frete na hora.\n\n' +
      '**¿En qué idioma prefieres continuar? / Em qual idioma você prefere continuar?**',
      'bot'
    );
    inputEl.focus();
  });
</script>
</body>
</html>
